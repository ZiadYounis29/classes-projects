plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.ziadyounis.down4more.down4more"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.ziadyounis.down4more.down4more"
        // youtubedl-android 0.18.x requires minSdk 24 (Android 7.0 Nougat).
        // We pin minSdk here rather than rely on flutter.minSdkVersion so
        // the build fails fast on incompatible defaults.
        minSdk = Math.max(24, flutter.minSdkVersion as int)
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // youtubedl-android ships a bundled Python interpreter as native
        // libraries; we ship only the four ABIs the library supports.
        // Without this filter the build pulls in an empty `armeabi` folder
        // and gets rejected by Play Store as an "incomplete native library".
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    // youtubedl-android needs the bundled Python interpreter + yt-dlp
    // executable to be extractable at runtime. AGP 7+ defaults extractNativeLibs
    // to false, so we re-enable it for our app.
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        // youtubedl-android ships ZIP archives renamed to .so (libpython.zip.so,
        // libffmpeg.zip.so) so Android's native loader extracts them. They are
        // NOT real ELF binaries, so llvm-strip (used by AGP 8.6+) fails on them.
        doNotStrip '**/*.zip.so'
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // youtubedl-android bundles a Python interpreter + yt-dlp executable so we
    // can spawn downloads from native code on Android, where the desktop
    // approach of shelling out to a system `yt-dlp` binary is impossible.
    // See https://github.com/yausername/youtubedl-android.
    def youtubedlAndroidVersion = "0.18.1"
    implementation "io.github.junkfood02.youtubedl-android:library:$youtubedlAndroidVersion"
    implementation "io.github.junkfood02.youtubedl-android:ffmpeg:$youtubedlAndroidVersion"

    // Coroutines for the background-thread executor we run downloads on.
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
}
