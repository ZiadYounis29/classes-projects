plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

// ── Release signing ──────────────────────────────────────────────────────────
//
// Reads keystore credentials from `android/key.properties` (gitignored).
// If the file is missing or any field is blank the release build falls back
// to the debug keys so `flutter build apk --release` still works for local
// smoke-testing (Play Store rejects debug-signed APKs, but sideloading
// onto your own device works fine).
//
// To configure real release signing:
//   1. Generate a keystore once with `keytool`:
//        keytool -genkey -v -keystore ~/down4more-release.jks \
//          -keyalg RSA -keysize 2048 -validity 10000 \
//          -alias down4more
//   2. Copy `android/key.properties.example` to `android/key.properties`
//      and fill in the four values. Never commit `key.properties` or the
//      `.jks` file.
//   3. In CI, write `key.properties` from secrets at build time.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
def hasReleaseKey = keystorePropertiesFile.exists() &&
    keystoreProperties.getProperty("storeFile") &&
    keystoreProperties.getProperty("keyAlias")

android {
    namespace = "com.ziadyounis.down4more.down4more"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.ziadyounis.down4more.down4more"
        // youtubedl-android 0.18.x requires minSdk 24 (Android 7.0 Nougat).
        // We pin minSdk here rather than rely on flutter.minSdkVersion so
        // the build fails fast on incompatible defaults.
        minSdk = Math.max(24, flutter.minSdkVersion as int)
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // youtubedl-android ships a bundled Python interpreter as native
        // libraries; we ship only the four ABIs the library supports.
        // Without this filter the build pulls in an empty `armeabi` folder
        // and gets rejected by Play Store as an "incomplete native library".
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    // youtubedl-android needs the bundled Python interpreter + yt-dlp
    // executable to be extractable at runtime. AGP 7+ defaults extractNativeLibs
    // to false, so we re-enable it for our app.
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        // youtubedl-android ships ZIP archives renamed to .so (libpython.zip.so,
        // libffmpeg.zip.so) so Android's native loader extracts them. They are
        // NOT real ELF binaries, so llvm-strip (used by AGP 8.6+) fails on them.
        doNotStrip '**/*.zip.so'
    }

    signingConfigs {
        // Only registered when `android/key.properties` is present with the
        // required fields. Gradle resolves names lazily so referencing
        // `signingConfigs.release` below would NPE on machines without the
        // file — we read into a local variable instead.
        if (hasReleaseKey) {
            release {
                storeFile = file(keystoreProperties.getProperty("storeFile"))
                storePassword = keystoreProperties.getProperty("storePassword")
                keyAlias = keystoreProperties.getProperty("keyAlias")
                keyPassword = keystoreProperties.getProperty("keyPassword")
            }
        }
    }

    buildTypes {
        release {
            // When `android/key.properties` exists we sign with the user's
            // real keystore — Play Store-ready. Without it, fall back to
            // the debug keys so `flutter build apk --release` and the
            // GitHub Actions APK job still produce something installable.
            signingConfig = hasReleaseKey
                ? signingConfigs.release
                : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // youtubedl-android bundles a Python interpreter + yt-dlp executable so we
    // can spawn downloads from native code on Android, where the desktop
    // approach of shelling out to a system `yt-dlp` binary is impossible.
    // See https://github.com/yausername/youtubedl-android.
    def youtubedlAndroidVersion = "0.18.1"
    implementation "io.github.junkfood02.youtubedl-android:library:$youtubedlAndroidVersion"
    implementation "io.github.junkfood02.youtubedl-android:ffmpeg:$youtubedlAndroidVersion"

    // Coroutines for the background-thread executor we run downloads on.
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
}
